# Enable ZMK Studio (alpha)
CONFIG_ZMK_STUDIO=y

# Improved connection stability
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# Linux BLE stability tweaks
# Allow re-pairing without clearing bond on the host side first
# CONFIG_BT_SMP_ALLOW_UNAUTH_OVERWRITE=y
# Disable connection parameter update requests - Linux BT stacks often handle these poorly
CONFIG_BT_CTLR_CONN_PARAM_REQ=n
# Increase TX power for more stable connection
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
