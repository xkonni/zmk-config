# Enable ZMK Studio (alpha)
# Allows live keymap editing over USB without reflashing firmware.
CONFIG_ZMK_STUDIO=y


# ── BLE CONNECTION STABILITY ──────────────────────────────────────────────────

# Enables experimental BLE connection improvements in ZMK.
# Adds more robust handling of connection state, improves reconnection speed,
# and reduces the chance of getting stuck in a "connected but not working" state.
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# When =y, Zephyr only allows notifications/indications to clients that have
# explicitly subscribed via CCCD. Some Linux BT stacks (BlueZ) do not always
# complete the subscription handshake properly, causing the keyboard to silently
# drop HID reports. Disabling this enforcement means reports are sent regardless.
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# Allow re-pairing without clearing the bond on the host side first.
# Useful when the Linux host has stale bond data and refuses to reconnect.
# Left commented out — only needed as a one-time rescue measure.
# CONFIG_BT_SMP_ALLOW_UNAUTH_OVERWRITE=y

# Enables the controller-side Connection Parameter Request (CPR) procedure.
# After waking from deep sleep, BlueZ reconnects using its own default intervals
# (often 100–200ms+). Without CPR, the keyboard cannot renegotiate back to the
# 15–30ms preferred intervals, causing extremely poor input quality until the
# user manually disconnects and reconnects. Re-enabling CPR allows the keyboard
# to request faster intervals after each reconnect.
# BlueZ occasionally mishandles CPR during stable connections (brief hiccup),
# but that is preferable to broken quality after every sleep wakeup.
# CONFIG_BT_CTLR_CONN_PARAM_REQ=y

# Sets the BLE radio transmit power to +8 dBm (maximum).
# Higher TX power increases signal range and reduces packet loss in noisy
# RF environments (offices, many nearby BT devices). Costs slightly more power.
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y


# ── CONNECTION INTERVAL TUNING ────────────────────────────────────────────────
# The peripheral (keyboard) advertises preferred connection parameters to the
# central (host). The host is free to accept or ignore them. Units are
# 1.25 ms per step.

# Minimum preferred connection interval: 12 × 1.25ms = 15ms.
# Lower bound on how frequently the host polls the keyboard. 15ms keeps
# latency low without being too aggressive for the radio scheduler.
# CONFIG_BT_PERIPHERAL_PREF_MIN_INT=12

# Maximum preferred connection interval: 24 × 1.25ms = 30ms.
# Upper bound. The host will settle somewhere between min and max.
# Keeping max at 30ms avoids the very long intervals (e.g. 100ms+) that
# some hosts default to, which cause noticeable input lag.
# CONFIG_BT_PERIPHERAL_PREF_MAX_INT=24

# Peripheral latency: number of connection events the peripheral may skip
# when it has no data to send. 0 means the keyboard wakes up every interval
# without skipping any — maximises responsiveness at the cost of slightly
# higher idle power draw.
# CONFIG_BT_PERIPHERAL_PREF_LATENCY=0

# Supervision timeout: 600 × 10ms = 6 seconds.
# If the central receives no valid packet from the peripheral within this
# window, it considers the link lost and drops the connection. 6s is long
# enough to survive brief RF gaps without false disconnects, but short
# enough that a real drop is detected quickly so reconnection can begin.
# CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=600


# ── BATTERY REPORTING ─────────────────────────────────────────────────────────

# How often (in seconds) the keyboard reports battery level over BLE.
# Default is 60s. Linux BlueZ reads the battery GATT characteristic eagerly
# and each read competes with HID traffic on the BLE link. 300s (5 min)
# significantly reduces that overhead without meaningfully impacting the
# usefulness of the battery indicator.
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=300


# ── SLEEP / IDLE ──────────────────────────────────────────────────────────────

# Enables deep sleep support. When the keyboard sleeps, the BLE radio is
# powered down entirely, preventing it from generating spurious traffic or
# interfering with the host's power management.
CONFIG_ZMK_SLEEP=y

# Time in milliseconds of inactivity before the keyboard enters idle state.
# 60000ms = 1 minute. In idle the display (if any) turns off and non-essential
# tasks are paused, but BLE stays connected.
CONFIG_ZMK_IDLE_TIMEOUT=60000

# Time in milliseconds of inactivity before the keyboard goes into deep sleep.
# 1800000ms = 30 minutes. The keyboard will disconnect from BLE and power down
# the radio. It wakes on the first keypress and reconnects automatically.
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000


# ── SPLIT KEYBOARD QUEUES ─────────────────────────────────────────────────────

# Number of key-position events the central (left) half can buffer from the
# peripheral (right) half over the BLE split link. Default is 5.
# Increasing to 10 prevents dropped keystrokes during brief periods of split
# link congestion (e.g. when the host BLE connection is also busy).
CONFIG_ZMK_SPLIT_BLE_CENTRAL_POSITION_QUEUE_SIZE=10

# Size of the key-scan event queue that feeds into ZMK's event system.
# Default is 4. A larger queue (8) absorbs bursts of simultaneous keypresses
# (e.g. chords, modifiers + keys) without dropping events under load.
CONFIG_ZMK_KSCAN_EVENT_QUEUE_SIZE=8


# ── HID RELIABILITY ───────────────────────────────────────────────────────────

# When enabled, modifier key releases are sent in a separate HID report instead
# of being combined with other key releases in one report.
# This prevents "stuck modifier" bugs where the host does not register that
# Shift/Ctrl/Alt has been released, because the combined report was processed
# incorrectly by the HID stack. Particularly common on Linux with BlueZ.
CONFIG_ZMK_HID_SEPARATE_MOD_RELEASE_REPORT=y
